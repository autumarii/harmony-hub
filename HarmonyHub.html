<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HarmonyHub</title>
  <link rel="stylesheet" href="CSSFiles/logoandstyles.css">
  <link rel="stylesheet" href="CSSFiles/albumgrid.css">
  <link rel="stylesheet" href="CSSFiles/albumcards.css">
  <link rel="stylesheet" href="CSSFiles/popups.css">
</head>
<body>
  <button id="ownedAlbumsBtn" class="top-left-button">My Albums</button>

  <!-- Logo -->
  <img src="PNGs/harmonyhublogov1.png" alt="HarmonyHub Logo" class="logo">

  <!-- Dark Mode Toggle -->
  <button id="darkModeToggle">Toggle Dark Mode</button>

  <!-- Featured Albums -->
  <h2>Featured Albums</h2>
  <div class="album-grid" id="featuredAlbums"></div>
  <div class="carousel">
  <button class="carousel-btn" id="prevBtn">◀</button>
  <div class="album-grid" id="featuredAlbums"></div>
  <button class="carousel-btn" id="nextBtn">▶</button>
  </div>


  <!-- Search Bar -->
  <input type="text" id="albumSearch" placeholder="Search albums..." />

  <!-- All Albums -->
  <h2>All Albums</h2>
  <div class="album-grid" id="allAlbums"></div>

  <!-- Artist Popup -->
  <div class="popup" id="artistPopup">
    <div class="popup-content">
      <h2 id="artistName"></h2>
      <div id="artistInfo"></div>
      <button onclick="closeArtistPopup()">Close</button>
    </div>
  </div>

  <!-- Owned Albums Popup -->
  <div class="popup" id="ownedAlbumsPopup">
    <div class="popup-content owned-popup-content">
      <div class="owned-popup-header">
        <button class="owned-close-btn" onclick="closeOwnedAlbumsPopup()" aria-label="Close owned albums popup">×</button>
        <h2>OWNED ALBUMS</h2>
      </div>
      <div id="ownedAlbumsList"></div>
    </div>
  </div>

  <!-- Album Popup -->
  <div class="popup" id="albumPopup">
    <div class="popup-content">
      <img id="popupCover" alt="Album Cover">
      <h2 id="popupAlbumTitle"></h2>
      <p id="popupArtist"></p>
      <p id="popupGenre"></p>
      <p id="popupDate"></p>
      <p id="popupSlogan"></p>
      <p id="popupDescription"></p>
      <p id="popupRanking"></p>
      <p id="popupSong"></p>
      <button onclick="closeAlbumPopup()">Close</button>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="JavascriptFiles/album-database.js"></script>
  <script src="JavascriptFiles/coverimage.js"></script>
  <script src="JavascriptFiles/albumcard.js"></script>
  <script src="JavascriptFiles/loadalbums.js"></script>
  <script src="JavascriptFiles/album-carousel.js"></script>
  <script src="JavascriptFiles/album-popup.js"></script>
  <script src="JavascriptFiles/artist-popup.js"></script>
  <script src="JavascriptFiles/albumsearch.js"></script>
  <script src="JavascriptFiles/darkmode.js"></script>
  <script src="JavascriptFiles/popupextra.js"></script>
</html>
