<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Your Next Favorite Album is Here</title>


    <style>
        body {

            margin: 0;
            background: #fce7bb;
            font-family: Arial, Helvetica, sans-serif;
            color: #5A4A45;

        }


        /* Logo */

        .logo {

            display: block;
            width: 180px;
            height: 180px;
            margin: 60px auto 25px;

            object-fit: contain;

        }


        /* Header */

        .description {

            text-align: center;
            font-size: 34px;
            font-weight: bold;

            color: #5A4A45;

            margin-bottom: 70px;

        }



        /* Section Titles */

        .section-title {

            text-align: center;

            font-size: 28px;

            margin: 40px 0;

            font-weight: bold;

        }



        /* Featured Album Slider */


        .slider {

            width: 90%;

            margin: auto;

            overflow: hidden;

        }


        .slides {

            display: flex;

            transition: 0.5s;

        }


        .slide {

            min-width: 100%;

            display: grid;

            grid-template-columns: repeat(4, 1fr);

            gap: 40px;

        }



        /* Album Cards */


        .album-card {

            text-align: center;

        }


        .cover {

            width: 220px;

            height: 220px;

            margin: auto;

            background: #d6bd89;

            border-radius: 12px;

            overflow: hidden;

        }


        .cover img {

            width: 100%;

            height: 100%;

            object-fit: cover;

        }



        .album-card a {

            color: #5A4A45;

            font-weight: bold;

            text-decoration: underline;

            cursor: pointer;

        }



        .artist-name {

            margin-top: 15px;

            font-size: 18px;

        }



        .album-name {

            font-size: 17px;

        }



        /* Buttons */


        .buttons {

            text-align: center;

            margin: 40px;

        }


        button {

            background: #5A4A45;

            color: white;

            border: none;

            padding: 12px 25px;

            margin: 10px;

            border-radius: 10px;

            cursor: pointer;

            font-size: 16px;

        }





        /* Similar Albums */


        .similar-container {

            width: 90%;

            margin: auto;

            display: grid;

            grid-template-columns: repeat(4, 1fr);

            gap: 40px;

        }





        /* Popup */


        .popup {

            display: none;

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;


            background: rgba(0, 0, 0, 0.5);


            justify-content: center;

            align-items: center;

        }



        .popup-box {

            background: #fce7bb;

            width: 450px;

            padding: 30px;

            border-radius: 20px;

            text-align: center;

            max-height: 80vh;

            overflow: auto;

        }



        .popup-box img {

            width: 250px;

            height: 250px;

            object-fit: cover;

        }



        .close {

            float: right;

            font-size: 25px;

            cursor: pointer;

        }





        /* Mobile */


        @media(max-width:900px) {


            .slide {

                grid-template-columns: repeat(2, 1fr);

            }


            .similar-container {

                grid-template-columns: repeat(2, 1fr);

            }


        }



        @media(max-width:500px) {


            .slide {

                grid-template-columns: repeat(1, 1fr);

            }


            .similar-container {

                grid-template-columns: repeat(1, 1fr);

            }


        }
    </style>

</head>


<body>



    <!-- LOGO -->

    <img class="logo" src="harmonyhublogov1.png">



    <h1 class="description">
        Your Next Favorite Album is Here.
    </h1>




    <!-- FEATURED SECTION -->


    <h2 class="section-title">
        Top Album Collection
    </h2>



    <div class="slider">


        <div class="slides" id="slides">



            <!-- JavaScript will insert the 8 featured albums here -->


        </div>


    </div>



    <div class="buttons">

        <button onclick="changeSlide(-1)">
            Previous
        </button>


        <button onclick="changeSlide(1)">
            Next
        </button>


    </div>






    <!-- SIMILAR ALBUM SECTION -->


    <h2 class="section-title">
        Discover More Albums
    </h2>



    <div class="similar-container" id="similarAlbums">

        <!-- JavaScript adds all similar albums here -->

    </div>







    <!-- POPUP WINDOW -->


    <div class="popup" id="popup">


        <div class="popup-box">


            <span class="close" onclick="closePopup()">
                ×
            </span>


            <div id="popupContent">

            </div>



        </div>


    </div>
    <input type="checkbox" class="owned-checkbox" onclick="markOwned(index)">




    <script src="HarmonyHub.js"></script>


</body>

</html>
