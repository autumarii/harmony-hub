<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HarmonyHub - Your Next Favorite Album</title>

    <link rel="stylesheet" href="harmonyhub.css">
</head>

<body>

    <!-- Logo Section -->
    <header>
        <img 
            src="harmonyhublogov1.png" 
            alt="HarmonyHub Logo" 
            class="logo"
        >

        <h1>
            Your Next Favorite Album is Here.
        </h1>
    </header>


    <!-- Top 8 Albums -->
    <section class="featured-section">

        <h2>
            Top 8 Albums
        </h2>


        <div id="featuredAlbums" class="album-grid">

            <!-- JavaScript will insert albums here -->

        </div>

    </section>



    <!-- Discover Albums -->
    <section class="discover-section">

        <h2>
            Discover Albums
        </h2>


        <div id="allAlbums" class="album-grid">

            <!-- JavaScript will insert albums here -->

        </div>


    </section>



    <!-- Artist Popup -->
    <div id="artistPopup" class="popup">

        <div class="popup-content">

            <span 
                class="close"
                onclick="closeArtistPopup()"
            >
                &times;
            </span>


            <h2 id="artistName"></h2>

            <p id="artistInfo"></p>

        </div>

    </div>



    <!-- Album Popup -->
    <div id="albumPopup" class="popup">

        <div class="popup-content album-popup">

            <span 
                class="close"
                onclick="closeAlbumPopup()"
            >
                &times;
            </span>


            <img 
                id="popupCover"
                class="popup-cover"
                src=""
                alt="Album Cover"
            >


            <h2 id="popupAlbumTitle"></h2>


            <p>
                <strong>Artist:</strong>
                <span id="popupArtist"></span>
            </p>


            <p>
                <strong>Genre:</strong>
                <span id="popupGenre"></span>
            </p>


            <p>
                <strong>Release Date:</strong>
                <span id="popupDate"></span>
            </p>


            <p>
                <strong>Slogan:</strong>
                <span id="popupSlogan"></span>
            </p>


            <p>
                <strong>Description:</strong>
                <span id="popupDescription"></span>
            </p>


            <p>
                <strong>Spotify Ranking:</strong>
                <span id="popupRanking"></span>
            </p>


            <p>
                <strong>Most Listened Song:</strong>
                <span id="popupSong"></span>
            </p>


        </div>

    </div>



<script src="harmonyhub.js"></script>

</body>
</html>
